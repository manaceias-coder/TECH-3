<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - TechFerramentas</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f5f5f5; }
        .caixa-form { background: white; padding: 30px; border: 1px solid #ccc; border-radius: 8px; width: 100%; max-width: 350px; margin: 30px auto; }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #0066cc; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        a { display: block; text-align: center; margin-top: 20px; color: #0066cc; text-decoration: none; }
        @media (max-width: 768px) {
            .caixa { flex-direction: column; text-align: center; gap: 15px; }
            nav ul { flex-direction: column; gap: 10px; padding: 0; }
            .caixa-form { width: 90%; margin: 20px auto; }
        }
    </style>
</head>
<body>
    <header>
        <div class="caixa">
            <h1><img src="imagens/cabecalho.jpg" alt="Logo TechFerramentas"></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="recuperar-senha.html">Recuperar Senha</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="caixa-form">
            <h2>Criar Conta</h2>
            <input type="text" placeholder="Nome completo">
            <input type="email" placeholder="E-mail">
            <input type="tel" placeholder="Telefone">
            <input type="password" placeholder="Senha">
            <input type="password" placeholder="Repetir senha">
            <button>Cadastrar</button>
            <a href="login.html">Já tenho conta</a>
        </div>
    </main>

    <footer>
        <img src="imagens/dodape.jpg" alt="Logo TechFerramentas branco">
        <p class="copyright">&copy; Copyright TechFerramentas - 2025 | Todos os direitos reservados</p>
    </footer>
</body>
</html>
